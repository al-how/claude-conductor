# Claude Conductor — example config
# Copy to config/config.yaml and fill in values

telegram:
  bot_token: "${TELEGRAM_BOT_TOKEN}"
  allowed_users:
    - 123456789  # Your Telegram user ID
  # Stream partial assistant responses to Telegram (edit-in-place while generating)
  streaming_enabled: true
  # Show tool use events (e.g. [tool] Read: /vault/file.md) inline in stream messages
  show_tool_events: true
  # Per-source timeout override (seconds, 30–86400). Falls back to queue.timeout_seconds.
  # Set this if you want long Telegram sessions without raising the global queue ceiling.
  # timeout_seconds: 3600

cron:
  - name: heartbeat
    schedule: "*/30 * * * *"
    prompt: "Run a quick health check. Verify vault is accessible."
    output: log

# Model selection (optional)
# Shorthand: opus, sonnet, haiku — or use full model IDs
# model: sonnet

# Provider selection (optional)
# Default is 'claude' (uses OAuth via mounted .credentials.json)
# Options: claude | openrouter | ollama
# provider: claude

# API mode — required for execution_mode: 'api' cron jobs
# Use env var substitution to avoid storing the key in plain text
# api:
#   anthropic_api_key: "${ANTHROPIC_API_KEY}"

# OpenRouter — route Claude CLI to OpenRouter's API
# Enables access to 300+ models via the same Claude CLI runtime
# openrouter:
#   api_key: "${OPENROUTER_API_KEY}"
#   base_url: "https://openrouter.ai/api"  # default, can omit
#   default_model: "qwen/qwen3-coder"      # used when no model specified
#   allowed_models:
#     - "qwen/qwen3-coder"
#     - "google/gemini-2.0-flash-001"
#     - "meta-llama/llama-4-scout"

# Ollama — run local models via Ollama
# ollama:
#   base_url: "http://192.168.1.100:11434"
#   default_model: "qwen3-coder"   # used when no model specified
#   allowed_models:
#     - "qwen3-coder"
#     - "llama3.3"

webhooks: []

queue:
  max_concurrent: 1
  # Default timeout for any task source (seconds, 30–86400). Telegram can override via telegram.timeout_seconds.
  timeout_seconds: 300

# Google Workspace MCP (Gmail, Calendar, Drive, Docs, etc.)
# google_workspace:
#   enabled: true
#   tool_tier: core        # core | extended | complete
#   read_only: false       # restrict to read-only Gmail/Drive scopes

browser:
  enabled: false
  # user_data_dir: /data/browser-profile  # persistent login sessions
  # vnc_port: 6080                         # noVNC port for manual login

# Google Maps MCP (places search, geocoding, directions, distance)
# google_maps:
#   enabled: true
#   api_key: "${GOOGLE_MAPS_API_KEY}"
